<script>
document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("userInput");
    const submitButton = document.getElementById("submitButton");
    const chatMessages = document.getElementById("chatMessages");
    const greeting = document.getElementById("launchGreeting");
    const disclaimer = document.getElementById("bottomDisclaimer");
    const composerButton = document.getElementById("composer-create-button");

    if (!input || !submitButton || !chatMessages) return;

    const maxHeight = 150;
    const groqEndpoint = "https://api.groq.com/openai/v1/chat/completions";
    const storageKey = "groq_api_key";
    const systemPrompt = "You are a helpful AI copilot embedded in a web UI. Keep responses clear, concise, and practical.";
    let isLoading = false;
    let conversation = [];
    let apiKey = localStorage.getItem(storageKey) || "";

    const autoResize = () => {
        input.style.height = "auto";
        const newHeight = Math.min(input.scrollHeight, maxHeight);
        input.style.height = newHeight + "px";
        input.style.overflowY = input.scrollHeight > maxHeight ? "auto" : "hidden";
    };

    const hideIntro = () => {
        if (greeting && greeting.style.display !== "none") {
            greeting.classList.add("fade-out");
            setTimeout(() => {
                greeting.style.display = "none";
            }, 300);
        }

        if (disclaimer && disclaimer.style.display !== "none") {
            disclaimer.classList.add("fade-out");
            setTimeout(() => {
                disclaimer.style.display = "none";
            }, 300);
        }

        const conversationShell = document.getElementById("conversationShell");
        if (conversationShell) {
            conversationShell.classList.add("chat-active");
        }
    };

    const setLoading = (loading) => {
        isLoading = loading;
        submitButton.disabled = loading;
        submitButton.classList.toggle("is-loading", loading);
        input.disabled = loading;
    };

    const promptForApiKey = () => {
        const entered = window.prompt("Enter your Groq API key. It will be stored in this browser via localStorage.", apiKey || "");
        if (entered === null) return apiKey;
        apiKey = entered.trim();
        if (apiKey) {
            localStorage.setItem(storageKey, apiKey);
        } else {
            localStorage.removeItem(storageKey);
        }
        return apiKey;
    };

    const appendMessage = (role, content) => {
        const wrapper = document.createElement("div");
        wrapper.className = `message-row ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = content;

        wrapper.appendChild(bubble);
        chatMessages.appendChild(wrapper);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return bubble;
    };

    const updateAssistantMessage = (bubble, content) => {
        bubble.textContent = content;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    };

    const sendMessage = async () => {
        const content = input.value.trim();
        if (!content || isLoading) return;

        hideIntro();

        if (!apiKey) {
            promptForApiKey();
        }

        if (!apiKey) {
            appendMessage("assistant", "Add a Groq API key before sending a message.");
            return;
        }

        appendMessage("user", content);
        conversation.push({ role: "user", content });
        input.value = "";
        autoResize();

        const assistantBubble = appendMessage("assistant", "Thinking…");
        setLoading(true);

        try {
            const response = await fetch(groqEndpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${apiKey}`,
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    temperature: 0.6,
                    messages: [
                        { role: "system", content: systemPrompt },
                        ...conversation,
                    ],
                }),
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                const errorMessage = data?.error?.message || `Groq request failed with status ${response.status}.`;
                throw new Error(errorMessage);
            }

            const reply = data?.choices?.[0]?.message?.content?.trim();
            if (!reply) {
                throw new Error("Groq returned an empty response.");
            }

            conversation.push({ role: "assistant", content: reply });
            updateAssistantMessage(assistantBubble, reply);
        } catch (error) {
            const message = error instanceof Error ? error.message : "Something went wrong while contacting Groq.";
            updateAssistantMessage(assistantBubble, message);
        } finally {
            setLoading(false);
            input.focus();
        }
    };

    input.addEventListener("input", () => {
        autoResize();
        if (input.value.trim()) {
            hideIntro();
        }
    });

    input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    submitButton.addEventListener("click", sendMessage);
    composerButton?.addEventListener("click", promptForApiKey);

    autoResize();
});
</script>
